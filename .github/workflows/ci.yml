name: ci

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" --no-deps
          pip install psycopg[binary] pandas pyyaml pydantic pytest pytest-asyncio ruff mypy testcontainers
      - name: Ruff
        run: ruff check src tests
      - name: Mypy
        run: mypy src
      - name: Unit tests
        run: pytest -v
